# ============================================================
# Serenity BDD - System Properties
# ============================================================
serenity.project.name=Sistema de Tickets - E2E Tests

# URL base de la aplicación
webdriver.base.url=http://localhost:3000

# Driver a usar (chrome / firefox / edge)
webdriver.driver=chrome

# Timeout implícito (segundos)
webdriver.timeouts.implicitlywait=0

# Tamaño de ventana
thucydides.browser.window.size=1920x1080

# Captures screenshots en fallos
serenity.take.screenshots=FOR_FAILURES

# Reporte HTML
serenity.outputDirectory=target/site/serenity

# Demo delay en segundos (0 = sin retraso, 1+ = retraso visible)
demo.delay=1
